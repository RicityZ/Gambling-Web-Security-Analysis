<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎰 Mahjong Slot Premium</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎰</text></svg>">
</head>
<body>
  <div class="game-container">
    <h1 class="title">🎰 Mahjong Slot Premium</h1>
    
    <div class="top-bar">
      <div>
        <div style="font-size: 12px; opacity: 0.8; margin-bottom: 4px;">MULTIPLIER</div>
        <span id="multiplier">x1</span>
      </div>
      <div>
        <div style="font-size: 12px; opacity: 0.8; margin-bottom: 4px;">💰 BALANCE</div>
        <span id="balance">1000</span> บาท
      </div>
    </div>
    
    <div class="slot-grid" id="slotGrid">
      <!-- Tiles will be generated by JavaScript -->
    </div>
  </div>

  <div class="slot-control-bar">
    <div class="bet-control">
      <button id="turbo" class="control-btn">⚡ TURBO</button>
    </div>
    
    <div class="bet-control">
      <button id="minus" class="circle-btn">➖</button>
      <div class="bet-info">
        BET<br/>
        <span id="betAmount">100</span>
      </div>
      <button id="plus" class="circle-btn">➕</button>
    </div>
    
    <button id="spinButton" class="spin-btn">
      <span style="position: relative; z-index: 1;">SPIN</span>
    </button>
    
    <div class="win-control">
      <div class="win-info">
        WIN<br/>
        <span id="win">0</span>
      </div>
    </div>
    
    <div class="win-control">
      <button id="auto" class="control-btn">🔄 AUTO</button>
    </div>
  </div>

  <div id="popup" class="popup" style="display: none;"></div>
  
  <script src="main.js"></script>
</body>
</html>
